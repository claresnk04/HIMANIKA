    <circle cx="392" cy="120" r="8" />
    <circle cx="256" cy="360" r="8" />
    <path d="M120 120 L256 360 L392 120" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.12" />
  </g>

  <!-- text -->
  <text x="50%" y="460" font-family="Arial, Helvetica, sans-serif" font-size="36" fill="#ffffff" font-weight="700" text-anchor="middle">KABINET</text>
  <text x="50%" y="492" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#ffffff" text-anchor="middle">HIMANIKA FT UNY</text>
